# You can use this file to create a conda environment for this pipeline:
#   conda env create --name hostfinder_env -f environment.yml
name: nf-core-hostfinder-1.0dev
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # nf-core standard packages
  - conda-forge::python=3.11.9
  - conda-forge::markdown=3.1.1
  - conda-forge::pymdown-extensions=6.0
  - conda-forge::pygments=2.5.2
  # Bioinformatics tools
  - bioconda::prokka=1.14.6
  - bioconda::quast=5.3.0
  - bioconda::panaroo=1.5.2
  - bioconda::snippy=4.6.0
  - bioconda::pymlst=2.2.2
  - bioconda::snp-dists=0.8.2
  # Additional Python packages
  - conda-forge::scikit-learn=1.5.1
  - conda-forge::networkx=3.4.2
  - conda-forge::pandas=2.2.3
  - conda-forge::numpy=1.26.4
  - conda-forge::matplotlib=3.9.1